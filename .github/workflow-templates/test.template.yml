name: Test {{ package.name }}

on:
  push:
    paths:
      - "{{ package.path }}/**"
      {%- for dependency in package.workspace_dependencies %}
      - "{{ dependency.path }}/**"
      {%- endfor %}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build wheel
        run: uv build
        working-directory: {{ package.path }}

  test:
    runs-on: ubuntu-latest

    services:
      redpanda:
        image: redpandadata/redpanda:v25.2.1
        ports:
          - 9092:9092
          - 9644:9644
        options: >-
          --health-cmd "curl -f http://localhost:9644/v1/status/ready"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      # clickhouse:
      #   image: clickhouse/clickhouse-server:latest
      #   ports:
      #     - 8123:8123
      #     - 9000:9000
      #   env:
      #     CLICKHOUSE_DB: default
      #     CLICKHOUSE_USER: default
      #     CLICKHOUSE_PASSWORD: default
      #   options: >-
      #     --health-cmd "curl -f http://localhost:8123/ping"
      #     --health-interval 5s
      #     --health-timeout 5s
      #     --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v6
      
      - name: Install deps
        run: uv sync --package {{ package.name }}

      - name: Check formatting
        run: uv run ruff check {{ package.path }}

      - name: Run tests
        run: uv run pytest {{ package.path }}
