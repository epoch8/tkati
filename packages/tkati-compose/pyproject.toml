[project]
name = "tkati-compose"
version = "0.1.0"
description = "Declarative data pipeline orchestration — local Docker Compose environment"
readme = "README.md"
authors = [
    { name = "Andrey Tatarinov", email = "a@tatarinov.co" }
]
requires-python = ">=3.13"
dependencies = [
    "tkati-core",
    "click>=8",
    "kafka-python>=2.0",
    "pyyaml>=6",
]

[build-system]
requires = ["uv_build>=0.10.3,<0.11.0"]
build-backend = "uv_build"

[tool.uv.sources]
tkati-core = { workspace = true }
