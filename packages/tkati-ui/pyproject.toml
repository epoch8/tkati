[project]
name = "tkati-ui"
version = "0.1.0"
description = "Declarative data pipeline orchestration — web UI"
readme = "README.md"
authors = [
    { name = "Andrey Tatarinov", email = "a@tatarinov.co" }
]
requires-python = ">=3.13"
dependencies = [
    "tkati-core",
    "fastapi>=0.115",
    "uvicorn>=0.34",
    "jsonnet>=0.20",
]

[build-system]
requires = ["uv_build>=0.10.3,<0.11.0"]
build-backend = "uv_build"

[tool.uv.sources]
tkati-core = { workspace = true }
