[project]
name = "tkati-core"
version = "0.2.0.post1"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "clickhouse-connect>=0.11.0",
    "confluent-kafka>=2.11.0",
    "loguru>=0.7.3",
    "orjson>=3.9.0",
    "pyarrow>=21.0.0",
    "pydantic-settings>=2.11.0",
    "tenacity>=9.0.0",
]

[dependency-groups]
dev = ["pytest>=9.0.1"]

[build-system]
requires = ["uv_build>=0.11.21,<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-root = ""

[tool.uv-workspace-codegen]
generate = true
template_type = "package"
