[project]
name = "tkati-core"
version = "0.3.0-alpha.2"
description = "Core abstractions for Kafka/ClickHouse streaming pipeline nodes"
readme = "README.md"
requires-python = ">=3.13"
license = { text = "Apache-2.0" }
keywords = ["kafka", "clickhouse", "streaming", "pyarrow", "data-pipeline"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Distributed Computing",
]
dependencies = [
    "clickhouse-connect>=0.11.0",
    "confluent-kafka>=2.11.0",
    "loguru>=0.7.3",
    "orjson>=3.9.0",
    "pyarrow>=21.0.0",
    "pydantic-settings>=2.11.0",
    "tenacity>=9.0.0",
]

[project.urls]
Repository = "https://github.com/epoch8/tkati"

[dependency-groups]
dev = ["pytest>=9.0.1"]

[build-system]
requires = ["uv_build>=0.11.21,<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-root = ""

[tool.uv-workspace-codegen]
generate = true
template_type = ["test", "publish"]
